services:
  backend:
    build:
      context: ./backend
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      DATA_DIR: /data
      OIDC_AUTHORITY: http://localhost:9000
      OIDC_METADATA_URL: http://oidc:9000/.well-known/openid-configuration
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - vw-data:/data
    depends_on:
      oidc:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8080
      NEXT_PUBLIC_OIDC_AUTHORITY: http://localhost:9000
      NEXT_PUBLIC_OIDC_CLIENT_ID: valuesworkshop
      NEXT_PUBLIC_OIDC_REDIRECT_URI: http://localhost:3000/auth/callback

  oidc:
    build:
      context: ./devtools/oidc
    ports:
      - "9000:9000"

volumes:
  vw-data:
